name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

env:
  # 使 actions/checkout、actions/setup-node 等 JS Actions 在 Node.js 24 上运行，
  # 消除 Node.js 20 弃用告警（参考 GitHub 2025-09-19 公告）
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build on ${{ matrix.platform }}${{ matrix.args && format(' ({0})', matrix.args) || '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust-target: aarch64-apple-darwin
          # macOS Intel
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            rust-target: x86_64-apple-darwin
          # Linux x86_64
          - platform: ubuntu-22.04
            args: ""
          # Windows x86_64
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux Tauri prerequisites
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            build-essential \
            curl \
            wget \
            file

      - name: Install npm dependencies
        run: npm ci

      - name: Build & publish via tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "zhmm-tauri ${{ github.ref_name }}"
          releaseBody: |
            ## zhmm-tauri ${{ github.ref_name }}

            See [CHANGELOG](https://github.com/szgenle/zhmm-tauri/commits/${{ github.ref_name }}) for details.

            ⚠️ macOS / Windows 二进制目前未做代码签名 / 公证。
            首次启动可能触发 Gatekeeper / SmartScreen 警告，请通过 SHA256 校验后手动放行，或从源码自行构建。
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  checksums:
    name: Generate SHA256 checksums
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download release assets & emit SHA256SUMS
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p artifacts
          gh release download "$TAG" -R "$GITHUB_REPOSITORY" -D artifacts || true
          if [ -d artifacts ] && [ -n "$(ls -A artifacts 2>/dev/null)" ]; then
            cd artifacts
            sha256sum * > SHA256SUMS.txt
            gh release upload "$TAG" SHA256SUMS.txt -R "$GITHUB_REPOSITORY" --clobber
          else
            echo "No artifacts found for $TAG; skip checksum step."
          fi
